<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;}
body{background:#ffffff;display:flex;justify-content:center;font-family:sans-serif;}
#gc{display:block;touch-action:none;border-radius:12px 12px 0 0;}
#wrap{position:relative;width:100%;cursor:default;}
#hud{position:absolute;top:8px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 10px;pointer-events:none;gap:5px;flex-wrap:wrap;}

#combo-disp{position:absolute;top:48px;left:50%;transform:translateX(-50%);pointer-events:none;font-weight:700;opacity:0;transition:opacity 0.3s;white-space:nowrap;font-size:18px;}

#sword-up{position:absolute;top:48%;left:50%;transform:translate(-50%,-50%);font-size:20px;font-weight:700;color:#ffd700;text-shadow:0 0 12px #ffa;opacity:0;pointer-events:none;white-space:nowrap;transition:opacity 0.3s;}
#credit{position:absolute;bottom:6px;right:10px;color:rgba(255,255,255,0.3);font-size:10px;pointer-events:none;}
#overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;border-radius:12px;z-index:20;}
#overlay.hidden{display:none;}
.obox{background:rgba(8,8,28,0.94);color:#fff;border-radius:16px;padding:20px 28px;text-align:center;max-width:320px;width:90%;}
.obox h2{font-size:19px;margin-bottom:7px;}
.obox p{font-size:12px;color:rgba(255,255,255,0.68);margin-bottom:12px;line-height:1.6;}
.btn{background:#fff;color:#222;border:none;border-radius:22px;padding:7px 20px;font-size:13px;font-weight:500;cursor:pointer;margin:3px;}
.btn:hover{background:#eee;}
.btn-gold{background:#ffd700;color:#222;}
.btn-red{background:#ff4444;color:#fff;}
input.ni{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.28);border-radius:9px;color:#fff;font-size:14px;padding:7px 12px;width:100%;margin-bottom:10px;outline:none;text-align:center;}
input.ni::placeholder{color:rgba(255,255,255,0.38);}
input.ni:focus{border-color:#ffd700;}
#lb-tbl{width:100%;border-collapse:collapse;margin-top:5px;}
#lb-tbl th{color:rgba(255,255,255,0.42);font-size:10px;padding:3px 5px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.08);}
#lb-tbl td{font-size:12px;padding:4px 5px;border-bottom:1px solid rgba(255,255,255,0.05);}
#lb-tbl tr.me td{color:#ffd700;font-weight:600;}
#lb-tbl .lbsc{text-align:right;color:#ffd700;}
#lb-tbl .lblv{text-align:right;color:rgba(255,255,255,0.4);font-size:10px;}
/* 底部 */
#bot{background:rgba(12,12,38,0.97);border-radius:0 0 12px 12px;border-top:1px solid rgba(255,255,255,0.07);padding:7px 10px;display:flex;flex-direction:column;gap:5px;align-items:center;}
#btn-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:center;}
.tbtn{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);border-radius:9px;padding:5px 12px;font-size:12px;cursor:pointer;}
.tbtn:hover{background:rgba(255,255,255,0.2);}
.tbtn.on{background:rgba(255,215,0,0.2);border-color:#ffd700;color:#ffd700;}
.ctrl-btn{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.18);border-radius:7px;padding:3px 10px;font-size:13px;cursor:pointer;}
.ctrl-btn:hover{background:rgba(255,255,255,0.22);}
#sz-label{color:rgba(255,255,255,0.55);font-size:11px;min-width:34px;text-align:center;}
.panel{display:none;width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:7px;}
.panel.show{display:block;}
.ptitle{color:rgba(255,255,255,0.45);font-size:10px;text-align:center;margin-bottom:5px;letter-spacing:1px;}
.items{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;}
.si{width:42px;height:42px;border-radius:7px;background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.12);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:18px;position:relative;transition:all 0.12s;}

.si.on{border-color:#ffd700;background:rgba(255,215,0,0.15);}
.si span{position:absolute;bottom:1px;font-size:7px;color:rgba(255,255,255,0.5);line-height:1;}
#game-cont{display:flex;flex-direction:column;align-items:center;width:100%;}
</style>

const GAS='https://script.google.com/macros/s/AKfycbzDscClxbHDQlgHGPaldGGic96_7mKfxZrJZjOLd3DIlWlV4EahxPVEEaNUlM7fVo2EDQ/exec';

function addLB(name,score,level){
  // 用 Image 方式送資料，可繞過 CORS 限制
  const url=GAS+'?action=add&name='+encodeURIComponent(name)+'&score='+score+'&level='+level;
  const img=new Image();
  img.src=url;
  // 同時存本地備份
  try{
    const a=JSON.parse(localStorage.getItem('fsLBv4')||'[]');
    a.push({name,score,level});a.sort((x,y)=>y.score-x.score);
    localStorage.setItem('fsLBv4',JSON.stringify(a.slice(0,20)));
  }catch(e){}
}

function showLB(hlName,hlScore){
  const M=['🥇','🥈','🥉'];
  // 顯示載入中
  overlay.classList.remove('hidden');
  overlay.innerHTML=`<div class="obox" style="min-width:260px">
    <h2>🏆 排行榜</h2>
    <p style="text-align:center;opacity:.6;padding:10px">載入中...</p>
    <div style="margin-top:10px;text-align:center"><button class="btn" id="lbClose2">關閉</button></div>
  </div>`;
  document.getElementById('lbClose2').onclick=()=>{overlay.classList.add('hidden');if(!running)showStart();};

  // 從 Google Sheet 讀取
  fetch(GAS+'?action=get')
    .then(r=>r.json())
    .then(data=>{
      const a=(data||[]).slice(0,10);
      const rows=a.length?a.map((e,i)=>{
        const me=hlName&&e.name===hlName&&e.score==hlScore;
        return`<tr class="${me?'me':''}"><td>${M[i]||i+1}</td><td>${e.name}</td><td class="lbsc">${e.score}</td><td class="lblv">Lv${e.level}</td></tr>`;
      }).join(''):'<tr><td colspan="4" style="text-align:center;opacity:.4;padding:12px">還沒紀錄！快去玩！</td></tr>';
      overlay.innerHTML=`<div class="obox" style="min-width:260px">
        <h2>🏆 排行榜</h2>
        <table id="lb-tbl"><thead><tr><th></th><th>綽號/號碼</th><th style="text-align:right">分數</th><th style="text-align:right">關卡</th></tr></thead>
        <tbody>${rows}</tbody></table>
        <div style="margin-top:10px;text-align:center"><button class="btn" id="lbClose3">關閉</button></div>
      </div>`;
      document.getElementById('lbClose3').onclick=()=>{overlay.classList.add('hidden');if(!running)showStart();};
    })
    .catch(()=>{
      // 讀取失敗改用本地資料
      try{
        const all=JSON.parse(localStorage.getItem('fsLBv4')||'[]');
        const a=all.slice(0,10);
        const rows=a.length?a.map((e,i)=>{
          const me=hlName&&e.name===hlName&&e.score==hlScore;
          return`<tr class="${me?'me':''}"><td>${M[i]||i+1}</td><td>${e.name}</td><td class="lbsc">${e.score}</td><td class="lblv">Lv${e.level}</td></tr>`;
        }).join(''):'<tr><td colspan="4" style="text-align:center;opacity:.4;padding:12px">還沒紀錄！快去玩！</td></tr>';
        overlay.innerHTML=`<div class="obox" style="min-width:260px">
          <h2>🏆 排行榜（本地）</h2>
          <table id="lb-tbl"><thead><tr><th></th><th>綽號/號碼</th><th style="text-align:right">分數</th><th style="text-align:right">關卡</th></tr></thead>
          <tbody>${rows}</tbody></table>
          <div style="margin-top:10px;text-align:center"><button class="btn" id="lbClose4">關閉</button></div>
        </div>`;
        document.getElementById('lbClose4').onclick=()=>{overlay.classList.add('hidden');if(!running)showStart();};
      }catch(e){}
    });

  // 不需要舊的 rows 變數，直接 return
  return;
  const rows='';
  overlay.classList.remove('hidden');
  overlay.innerHTML=`<div class="obox" style="min-width:260px"><h2>🏆 排行榜</h2>
    <table id="lb-tbl"><thead><tr><th></th><th>號碼</th><th style="text-align:right">分數</th><th style="text-align:right">關卡</th></tr></thead><tbody>${rows}${myRow}</tbody></table>
    <div style="margin-top:10px;display:flex;gap:6px;justify-content:center">
      <button class="btn" id="lbClose">關閉</button>
      
    </div></div>`;
  document.getElementById('lbClose').onclick=()=>{overlay.classList.add('hidden');if(!running)showStart();};
}

// ── 大小控制 ─────────────────────────────
const SIZES=[60,75,90,100,115,130,150];
let sizeIdx=3;
function applySize(){
  const isFS=!!(document.fullscreenElement||document.webkitFullscreenElement);
  const szLabel=document.getElementById('sz-label');
  let w,h;
  if(isFS){w=window.innerWidth;h=window.innerHeight;if(szLabel)szLabel.textContent='全螢幕';}
  else{if(szLabel)szLabel.textContent=SIZES[sizeIdx]+'%';

    w=Math.round(bw*(SIZES[sizeIdx]/100));
    h=Math.round(Math.min(620,Math.max(420,w*0.85)));}
  canvas.width=w;canvas.height=h;
  wrap.style.width=w+'px';wrap.style.height=h+'px';
}

// ── 音效 ─────────────────────────────────
let AC=null;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function tone(f,d,tp,v){try{const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type=tp||'sine';o.frequency.setValueAtTime(f,ac.currentTime);o.frequency.exponentialRampToValueAtTime(f*0.5,ac.currentTime+d);g.gain.setValueAtTime(v||0.13,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);o.start();o.stop(ac.currentTime+d);}catch(e){}}
function playSlice(){tone(580+Math.random()*200,0.13,'sine',0.14);}
function playBomb(){try{const ac=getAC(),buf=ac.createBuffer(1,ac.sampleRate*0.22,ac.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(ac.sampleRate*0.055));const s=ac.createBufferSource(),g=ac.createGain();s.buffer=buf;s.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(0.28,ac.currentTime);s.start();}catch(e){}}

function playFire(){tone(200,0.08,'sawtooth',0.18);setTimeout(()=>tone(300,0.1,'sawtooth',0.15),80);setTimeout(()=>tone(180,0.2,'sawtooth',0.10),280);}
function playUnfire(){tone(400,0.1,'sine',0.10);setTimeout(()=>tone(600,0.12,'sine',0.08),90);}
function playSwordUp(){[440,554,659,880].forEach((f,i)=>setTimeout(()=>tone(f,0.16,'triangle',0.10),i*55));}
let bgT=null;
function startBG(){stopBG();const mel=[261,329,392,523,392,329,261,220];let s=0;function tick(){tone(mel[s++%mel.length],0.28,'triangle',0.025);if(running)bgT=setTimeout(tick,320);}tick();}

function buildShop(containerId,list,getCur,setCur){
  const c=document.getElementById(containerId);
  list.forEach((o,i)=>{
    const el=document.createElement('div');
    el.className='si'+(i===0?' on':'');
    el.innerHTML=o.em+'<span>'+o.lb+'</span>';
    el.addEventListener('click',()=>{
      setCur(i);
      c.querySelectorAll('.si').forEach((e,j)=>e.classList.toggle('on',j===i));
    });
    c.appendChild(el);
  });
}

const MAX_LIVES=7,FREEZE_DUR=3,BLADE_STEP=5,BLADE_MAX=180;
let lives=MAX_LIVES,bladeLen=70,score=0,running=false,raf=null;
let fruits=[],parts=[],popups=[],trail=[];
let spawnT=0,spawnI=80,combo=0,comboT=0,level=1,levelScore=0;
let levelTrans=false,comboShow=0;
let charX=300,charY=300,mx=300,my=200,cmx=300,cmy=200;
let bSwing=0,bSwingT=0,slashHue=0;
let frozen=false,freezeLeft=0,freezeInt=null,suTimer=null;
let prevBlade={x1:0,y1:0,x2:0,y2:0};
const CS=1.1;

let highScore=0;try{highScore=parseInt(localStorage.getItem('fsHi4')||'0');}catch(e){}
hiEl.textContent=highScore;

function updateLives(){livespill.textContent='❤️'.repeat(Math.max(0,lives));}
function S(){return CS*(canvas.width/680);}
function lcfg(l){return{si:Math.max(28,80-l*7),mf:Math.min(3+l,9),bc:Math.min(0.07+l*0.025,0.2),sm:1+l*0.1,th:10+l*5};}
function ptSeg(px,py,ax,ay,bx,by){const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;if(l2===0)return Math.hypot(px-ax,py-ay);const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l2));return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));}
function curBL(){return Math.min(BLADE_MAX,WEAPONS[curWeapon].base+Math.floor(score/10)*BLADE_STEP);}
function getAngle(){
  const s=S(),bl=curBL()*s,tip=38*s+bl,m=8;
  const raw=Math.atan2(cmy-charY,cmx-charX);
  let tx=charX+Math.cos(raw)*tip,ty=charY+Math.sin(raw)*tip;
  tx=Math.max(m,Math.min(canvas.width-m,tx));ty=Math.max(m,Math.min(canvas.height-m,ty));
  return Math.atan2(ty-charY,tx-charX);
}
function getBlade(){
  const s=S(),bl=curBL()*s,ang=getAngle()+bSwing,c=Math.cos(ang),sn=Math.sin(ang);
  return{x1:charX+c*38*s,y1:charY+sn*38*s,x2:charX+c*(38*s+bl),y2:charY+sn*(38*s+bl)};
}

  {emoji:'🍒',juice:'#c0392b'},{emoji:'🍎',juice:'#e74c3c'},{emoji:'🍐',juice:'#b8e994'},
];

function spawnFruit(){
  const c=lcfg(level);if(fruits.filter(f=>!f.sliced).length>=c.mf)return;
  const bomb=Math.random()<c.bc,sz=Math.round(canvas.width*0.088);
  const x=sz+Math.random()*(canvas.width-sz*2),sp=c.sm;
  const vy=-(canvas.height*(0.025+Math.random()*0.015))*sp,vx=(Math.random()-0.5)*2.5*sp;
  if(bomb)fruits.push({x,y:canvas.height+sz,vx,vy,sz,type:'bomb',sliced:false,alpha:1,rot:0,rs:(Math.random()-0.5)*0.05});
  else{const f=FRUITS[Math.floor(Math.random()*FRUITS.length)];fruits.push({x,y:canvas.height+sz,vx,vy,sz,type:'fruit',emoji:f.emoji,juice:f.juice,sliced:false,alpha:1,rot:0,rs:(Math.random()-0.5)*0.045,dy:0});}
}
function spJ(x,y,color){for(let i=0;i<16;i++){const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*5;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,color,alpha:0.9,r:2+Math.random()*4,g:0.2});}}
function spFire(x,y){const fc=['#ff4400','#ff6600','#ff8800','#ffaa00','#ffcc00','#fff'];for(let i=0;i<22;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*8;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-4,color:fc[Math.floor(Math.random()*fc.length)],alpha:1,r:2+Math.random()*5,g:0.18});}}

function addCombo(){
  combo++;comboT=85;comboShow=70;
  if(combo>=2){const b=combo-1;score+=b;scEl.textContent=score;playCombo(Math.min(combo,4));
    comboDisp.textContent='COMBO x'+combo+' +'+b+'!';comboDisp.style.opacity='1';
    comboDisp.style.fontSize=(17+Math.min(combo*3,13))+'px';
    comboDisp.style.color=combo>=5?'#ff6b6b':combo>=3?'#ffd700':'#fff';}
}
function chkLv(){
  const c=lcfg(level);
  if(levelScore>=c.th&&!levelTrans){level++;levelScore=0;spawnI=lcfg(level).si;lvpill.textContent='關卡 '+level;levelTrans=true;playLvUp();
    lvBanner.innerHTML='🎉 關卡 '+level;lvBanner.style.opacity='1';lvBanner.style.transition='none';
    setTimeout(()=>{lvBanner.style.transition='opacity 0.9s';lvBanner.style.opacity='0';levelTrans=false;},1300);}
}
function doFreeze(){
  if(frozen)return;frozen=true;freezeLeft=FREEZE_DUR;playFire();
  freezeBar.style.opacity='1';freezeBar.textContent='🔥 火燒 '+freezeLeft+'s';
  clearInterval(freezeInt);
  freezeInt=setInterval(()=>{freezeLeft--;freezeBar.textContent='🔥 火燒 '+freezeLeft+'s';
    if(freezeLeft<=0){clearInterval(freezeInt);frozen=false;freezeBar.style.opacity='0';playUnfire();}},1000);
}
function loseLife(){lives--;updateLives();combo=0;comboT=0;if(lives<=0)endGame();}
function chkSU(){const n=curBL();if(n>bladeLen){bladeLen=n;playSwordUp();swordUp.style.opacity='1';clearTimeout(suTimer);suTimer=setTimeout(()=>swordUp.style.opacity='0',1200);}}
function chkBlade(cur){
  if(frozen)return;
  const mv=Math.hypot(cur.x2-prevBlade.x2,cur.y2-prevBlade.y2)+Math.hypot(cur.x1-prevBlade.x1,cur.y1-prevBlade.y1);
  if(mv<2)return;
  for(const f of fruits){
    if(f.sliced)continue;
    if(ptSeg(f.x,f.y,cur.x1,cur.y1,cur.x2,cur.y2)<f.sz*0.56){
      f.sliced=true;
      if(f.type==='bomb'){spFire(f.x,f.y);playBomb();loseLife();popups.push({x:f.x,y:f.y-24,text:'🔥 著火！',color:'#ff6600',alpha:1,vy:-1.5,sz:15});doFreeze();}
      else{score++;levelScore++;scEl.textContent=score;addCombo();spJ(f.x,f.y,f.juice||'#fff');playSlice();
        f.vx=(Math.random()-0.5)*6;f.vy=-2;f.dy=0;
        popups.push({x:f.x,y:f.y-f.sz*0.85,text:'+1',color:'#fff',alpha:1,vy:-2,sz:13});
        chkLv();bSwingT+=(Math.random()>0.5?1:-1)*0.5;slashHue=(slashHue+25)%360;chkSU();}
    }
  }
}

// ── 畫武器 ───────────────────────────────
function drawWeapon(s,ang,fr,fz){
  const W=WEAPONS[curWeapon],bl=curBL()*s,h=slashHue,BS=W.style;
  ctx.save();ctx.rotate(ang+bSwing);
  ctx.strokeStyle=fz?'#ffaa66':OUTFITS[curOutfit].skin;ctx.lineWidth=7*s;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(fr?9*s:-9*s,4*s);ctx.lineTo(22*s,0);ctx.stroke();
  ctx.fillStyle=fz?'#882200':W.hc[0];ctx.beginPath();ctx.arc(22*s,0,6*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,220,150,0.3)';ctx.beginPath();ctx.arc(22*s,0,3.5*s,0,Math.PI*2);ctx.fill();

  function handle(len){
    const hg=ctx.createLinearGradient(22*s,0,22*s+len,0);
    hg.addColorStop(0,fz?'#882200':W.hc[0]);hg.addColorStop(1,fz?'#cc4400':W.hc[1]);
    ctx.fillStyle=hg;ctx.beginPath();ctx.roundRect(22*s,-3.5*s,len,7*s,2*s);ctx.fill();
  }
  function guard(){
    ctx.fillStyle=fz?'#ffaa00':W.gc;
    ctx.beginPath();ctx.roundRect(33*s,-7*s,5*s,14*s,2*s);ctx.fill();
    ctx.beginPath();ctx.roundRect(30*s,-3.5*s,12*s,7*s,2*s);ctx.fill();
    ctx.fillStyle=fz?'#ff6600':W.gem;ctx.beginPath();ctx.arc(35.5*s,0,2.5*s,0,Math.PI*2);ctx.fill();
  }
  function blade(startX,wid,curved){
    const bg=ctx.createLinearGradient(startX,0,startX+bl,0);
    if(fz){bg.addColorStop(0,'#ff6600');bg.addColorStop(0.4,'#ffcc88');bg.addColorStop(1,'rgba(255,100,0,0.05)');}
    else{bg.addColorStop(0,`hsla(${h},100%,65%,0.93)`);bg.addColorStop(0.4,`hsla(${(h+40)%360},100%,87%,1)`);bg.addColorStop(1,`hsla(${(h+80)%360},100%,60%,0.05)`);}
    ctx.fillStyle=bg;
    if(curved){ctx.beginPath();ctx.moveTo(startX,-2*s);ctx.quadraticCurveTo(startX+bl*0.5,-8*s,startX+bl,0);ctx.lineTo(startX,2*s);ctx.closePath();ctx.fill();}
    else{const hw=wid||3.5;ctx.beginPath();ctx.moveTo(startX,-hw*s);ctx.lineTo(startX+bl,0);ctx.lineTo(startX,hw*s);ctx.closePath();ctx.fill();}
    ctx.strokeStyle=fz?'rgba(255,180,80,0.7)':`hsla(${(h+60)%360},100%,90%,0.6)`;ctx.lineWidth=1.5*s;
    ctx.beginPath();ctx.moveTo(startX,-1*s);ctx.lineTo(startX+bl*(curved?0.85:0.78),0.5*s);ctx.stroke();

    ctx.fillStyle='#ffd700';ctx.beginPath();ctx.moveTo(2*s,-16*s);ctx.lineTo(-1*s,-11*s);ctx.lineTo(1*s,-11*s);ctx.lineTo(-2*s,-6*s);ctx.lineTo(3*s,-12*s);ctx.lineTo(1*s,-12*s);ctx.lineTo(4*s,-16*s);ctx.closePath();ctx.fill();
  }else if(T==='pizza'){
    ctx.fillStyle=sk;ctx.beginPath();ctx.arc(0,-20*s,12*s,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#cc7722';ctx.beginPath();ctx.arc(0,-24*s,13*s,Math.PI,Math.PI*2);ctx.fill();
    ctx.fillStyle='#cc0000';ctx.beginPath();ctx.arc(0,-24*s,10*s,Math.PI,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffee44';ctx.beginPath();ctx.arc(0,-24*s,8*s,Math.PI,Math.PI*2);ctx.fill();
    ctx.fillStyle='#cc0000';ctx.beginPath();ctx.arc(-4*s,-26*s,2*s,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(4*s,-27*s,2*s,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#2ecc71';ctx.beginPath();ctx.arc(0,-28*s,1.5*s,0,Math.PI*2);ctx.fill();
  }else if(T==='rainbow'){
    ctx.fillStyle=sk;ctx.beginPath();ctx.arc(0,-20*s,12*s,0,Math.PI*2);ctx.fill();
    const rb2=['#ff4444','#ff8800','#ffff00','#44ff44','#4444ff','#8800ff','#ff44ff'];
    for(let i=0;i<7;i++){const ra=i*Math.PI/6-Math.PI*0.5;ctx.fillStyle=rb2[i];ctx.beginPath();ctx.ellipse(Math.cos(ra)*13*s,-20*s+Math.sin(ra)*13*s,4*s,8*s,ra,0,Math.PI*2);ctx.fill();}
  }else{
    // 預設
    ctx.fillStyle=sk;ctx.beginPath();ctx.arc(0,-20*s,12*s,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=O.hair;ctx.beginPath();ctx.arc(0,-25*s,10*s,Math.PI,Math.PI*2);ctx.fill();
  }
  // 共用眼睛 & 嘴巴
  const ed=fr?1:-1;
  ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(ed*2.5*s,-20*s,2.5*s,0,Math.PI*2);ctx.fill();
  if(!(T==='pirate'&&fr)){ctx.beginPath();ctx.arc(ed*7*s,-20*s,2.5*s,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ed*2*s,-21*s,1*s,0,Math.PI*2);ctx.fill();
  if(!(T==='pirate'&&fr)){ctx.beginPath();ctx.arc(ed*6.5*s,-21*s,1*s,0,Math.PI*2);ctx.fill();}
  ctx.strokeStyle='#b03030';ctx.lineWidth=2*s;ctx.lineCap='round';ctx.beginPath();
  if(fz)ctx.arc(ed*5*s,-15*s,3.5*s,0,Math.PI*2);else if(combo>=3)ctx.arc(ed*5*s,-15*s,3*s,0,Math.PI);else{ctx.moveTo(ed*2.5*s,-15*s);ctx.lineTo(ed*7.5*s,-15*s);}
  ctx.stroke();
  // 火焰特效
  if(fz){const fp=['#ff4400','#ff8800','#ffcc00'];for(let i=0;i<8;i++){const ia=i*Math.PI/4+Date.now()*0.004,ir=(12+Math.sin(Date.now()*0.008+i)*4)*s;ctx.fillStyle=fp[i%3];ctx.globalAlpha=0.5+Math.sin(Date.now()*0.01+i)*0.3;ctx.beginPath();ctx.arc(Math.cos(ia)*ir,-10*s+Math.sin(ia)*ir*0.4,2+Math.sin(Date.now()*0.005+i),0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;}
  ctx.restore();
}

// ── 背景 ─────────────────────────────────

// ── 背景 ─────────────────────────────────
function drawBg(){
  const r=15+level*4,g2=8+level*3,b=50+level*5;
  const grd=ctx.createLinearGradient(0,0,0,canvas.height);
  grd.addColorStop(0,`rgb(${r},${g2},${b})`);
  grd.addColorStop(1,`rgb(5,${15+level*2},${30+level*4})`);
  ctx.fillStyle=grd;ctx.fillRect(0,0,canvas.width,canvas.height);
  const t=Date.now()*0.0003;ctx.fillStyle='rgba(255,255,255,0.38)';
  for(let i=0;i<20;i++){
    const sx=(Math.sin(i*137.5+t)*0.5+0.5)*canvas.width;
    const sy=(Math.cos(i*97.3+t*0.7)*0.5+0.5)*canvas.height*0.5;
    ctx.beginPath();ctx.arc(sx,sy,0.6+Math.sin(i+t*2)*0.4,0,Math.PI*2);ctx.fill();
  }
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,canvas.height*0.82);ctx.lineTo(canvas.width,canvas.height*0.82);ctx.stroke();
}

function drawTrail(){
  if(trail.length<2)return;
  for(let i=1;i<trail.length;i++){
    const a=i/trail.length,h=(slashHue+i*8)%360;
    ctx.beginPath();ctx.moveTo(trail[i-1].x,trail[i-1].y);ctx.lineTo(trail[i].x,trail[i].y);
    ctx.strokeStyle=frozen?`rgba(255,120,0,${a*0.72})`:`hsla(${h},100%,68%,${a*0.8})`;
    ctx.lineWidth=2+a*4;ctx.lineCap='round';ctx.stroke();
    ctx.strokeStyle=frozen?`rgba(255,80,0,${a*0.2})`:`hsla(${h},100%,88%,${a*0.2})`;
    ctx.lineWidth=5+a*7;ctx.stroke();
  }
}

// ── 主更新 ───────────────────────────────
function update(){
  const s=S(),mg=22*s,tx=Math.max(mg,Math.min(canvas.width-mg,cmx));
  if(!frozen){charX+=(tx-charX)*0.09;bSwing+=(bSwingT-bSwing)*0.18;bSwingT*=0.84;slashHue=(slashHue+0.8)%360;}
  charY=canvas.height*0.74;bladeLen=curBL();
  const cb=getBlade();chkBlade(cb);
  prevBlade={x1:cb.x1,y1:cb.y1,x2:cb.x2,y2:cb.y2};
  trail.push({x:cb.x2,y:cb.y2});trail=trail.slice(-18);
  spawnT++;if(spawnT>=spawnI){spawnFruit();spawnT=0;}
  if(comboT>0){comboT--;if(comboT===0)combo=0;}
  if(comboShow>0){comboShow--;if(comboShow===0)comboDisp.style.opacity='0';}
  for(const f of fruits){
    f.vy+=0.3;f.x+=f.vx;f.y+=f.vy;f.rot+=f.rs||0;
    if(f.sliced){f.alpha-=0.025;if(f.dy!==undefined)f.dy+=1.2;}
    if(!f.sliced&&f.y>canvas.height+f.sz+10&&f.type==='fruit'){f.alpha=0;loseLife();}
  }
  fruits=fruits.filter(f=>f.alpha>0&&f.y<canvas.height+150);
  for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=p.g||0.1;p.alpha-=0.024;}
  parts=parts.filter(p=>p.alpha>0);
  for(const p of popups){p.y+=p.vy;p.alpha-=0.021;}
  popups=popups.filter(p=>p.alpha>0);
}

function gameLoop(){
  if(!running)return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBg();update();
  fruits.forEach(f=>{
    ctx.save();ctx.globalAlpha=f.alpha;ctx.translate(f.x,f.y);ctx.rotate(f.rot||0);
    ctx.font=f.sz+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    if(f.type==='bomb')ctx.fillText('💣',0,0);
    else if(f.sliced){
      ctx.save();ctx.translate(-f.sz*0.3,f.dy||0);ctx.rotate(-0.5);ctx.fillText(f.emoji,0,0);ctx.restore();
      ctx.save();ctx.translate(f.sz*0.3,-(f.dy||0));ctx.rotate(0.5);ctx.fillText(f.emoji,0,0);ctx.restore();
    }else ctx.fillText(f.emoji,0,0);
    ctx.restore();
  });
  for(const p of parts){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.globalAlpha=p.alpha;ctx.fill();}
  ctx.globalAlpha=1;
  drawTrail();drawChar();
  for(const p of popups){ctx.save();ctx.globalAlpha=p.alpha;ctx.font='bold '+p.sz+'px sans-serif';ctx.textAlign='center';ctx.fillStyle=p.color;ctx.fillText(p.text,p.x,p.y);ctx.restore();}
  raf=requestAnimationFrame(gameLoop);
}

// ── 開始 / 結束 ──────────────────────────
function startGame(){
  const ni=document.getElementById('nameInput');
  if(ni)playerName=(ni.value||'').trim()||'無名';
  fruits=[];parts=[];popups=[];trail=[];
  score=0;lives=MAX_LIVES;running=true;spawnT=0;combo=0;comboT=0;comboShow=0;
  level=1;levelScore=0;spawnI=lcfg(1).si;bSwing=0;bSwingT=0;slashHue=0;
  frozen=false;freezeLeft=0;clearInterval(freezeInt);freezeBar.style.opacity='0';
  bladeLen=WEAPONS[curWeapon].base;swordUp.style.opacity='0';
  charX=canvas.width/2;charY=canvas.height*0.74;
  mx=canvas.width/2;my=canvas.height*0.5;cmx=mx;cmy=my;
  prevBlade=getBlade();
  scEl.textContent=0;updateLives();lvpill.textContent='關卡 1';
  comboDisp.style.opacity='0';lvBanner.style.opacity='0';
  overlay.classList.add('hidden');
  cancelAnimationFrame(raf);startBG();gameLoop();
}

function endGame(){
  running=false;cancelAnimationFrame(raf);stopBG();
  clearInterval(freezeInt);frozen=false;freezeBar.style.opacity='0';
  if(score>highScore){highScore=score;try{localStorage.setItem('fsHi4',score);}catch(e){}hiEl.textContent=score;}
  addLB(playerName,score,level);
  const M=['🥇','🥈','🥉'];
  overlay.classList.remove('hidden');
  overlay.innerHTML=`<div class="obox" style="min-width:260px">
    <h2>遊戲結束！</h2>
    <p><strong style="font-size:20px;color:#ffd700">${playerName}</strong> 得了 <strong style="font-size:20px;color:#ffd700">${score}</strong> 分<br>關卡 ${level}</p>
    <div style="margin-top:10px;display:flex;gap:6px;justify-content:center">
      <button class="btn btn-gold" id="r1">再玩一次</button>
      <button class="btn" id="r2">🏆 排行榜</button>
    </div></div>`;
  document.getElementById('r1').onclick=showStart;
  document.getElementById('r2').onclick=()=>showLB(playerName,score);
}

// ── 滑鼠 ─────────────────────────────────
function setMouse(ex,ey){
  mx=ex;my=ey;
  cmx=Math.max(0,Math.min(canvas.width,ex));
  cmy=Math.max(0,Math.min(canvas.height,ey));
}
wrap.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();setMouse(e.clientX-r.left,e.clientY-r.top);});
wrap.addEventListener('touchmove',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();setMouse(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);},{passive:false});
wrap.addEventListener('touchstart',e=>{const r=canvas.getBoundingClientRect();setMouse(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);},{passive:false});

// ── 折疊面板 ─────────────────────────────
(function(){
  var openPanel=null;
  function toggle(panelId,btnId){
    var panel=document.getElementById(panelId);
    var btn=document.getElementById(btnId);
    if(!panel||!btn)return;
    if(openPanel===panel){
      panel.classList.remove('show');btn.classList.remove('on');openPanel=null;
    }else{
      if(openPanel){openPanel.classList.remove('show');document.querySelectorAll('.tbtn').forEach(function(b){b.classList.remove('on');});}
      panel.classList.add('show');btn.classList.add('on');openPanel=panel;
    }
  }
  document.getElementById('outfitBtn').addEventListener('click',function(){toggle('outfit-panel','outfitBtn');});
  document.getElementById('weaponBtn').addEventListener('click',function(){toggle('weapon-panel','weaponBtn');});
})();

// ── 大小 & 全螢幕 ────────────────────────
applySize();
window.addEventListener('resize',function(){applySize();if(!running)drawBg();});
['fullscreenchange','webkitfullscreenchange'].forEach(function(ev){
  document.addEventListener(ev,function(){setTimeout(applySize,100);});
});
document.getElementById('plusBtn').addEventListener('click',function(){if(sizeIdx<SIZES.length-1){sizeIdx++;applySize();}});
document.getElementById('minusBtn').addEventListener('click',function(){if(sizeIdx>0){sizeIdx--;applySize();}});
document.getElementById('fsBtn').addEventListener('click',function(){
  var el=gameCont;
  if(!document.fullscreenElement&&!document.webkitFullscreenElement){
    if(el.requestFullscreen)el.requestFullscreen();else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
  }else{
    if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();
  }
});
document.getElementById('lbBtn').addEventListener('click',function(){showLB();});
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('lbOpenBtn').addEventListener('click',function(){showLB();});

drawBg();
</script>
